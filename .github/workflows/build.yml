name: Build Windows EXE

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Windows EXEs
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install cross-compiler
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-mingw-w64-x86-64 gcc-mingw-w64-i686
    
    - name: Compile 64-bit
      run: |
        x86_64-w64-mingw32-gcc -O2 -static -o backdoor-x64.exe backdoor.c
    
    - name: Compile 32-bit
      run: |
        i686-w64-mingw32-gcc -O2 -static -o backdoor-x86.exe backdoor.c
    
    - name: Upload 64-bit EXE
      uses: actions/upload-artifact@v4
      with:
        name: windows-x64
        path: backdoor-x64.exe
    
    - name: Upload 32-bit EXE
      uses: actions/upload-artifact@v4
      with:
        name: windows-x86
        path: backdoor-x86.exe
